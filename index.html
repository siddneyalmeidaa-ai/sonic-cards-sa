<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC CARDS - S.A. EDITION</title>
    <style>
        body { background: #000; color: #bc13fe; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 90vw; max-width: 400px; }
        .card { height: 110px; background: #0a0a0a; border: 2px solid #222; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; color: transparent; transition: 0.4s; position: relative; }
        .card.active { border-color: #bc13fe; box-shadow: 0 0 25px #bc13fe; color: #fff; transform: rotateY(180deg); }
        .card.match { background: #00ff41; border-color: #00ff41; color: #000 !important; cursor: default; box-shadow: 0 0 15px #00ff41; transform: scale(0.95); }
        #info-panel { margin-bottom: 30px; text-align: center; width: 100%; }
        .btn-main { background: #bc13fe; color: #fff; border: none; padding: 20px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.2em; box-shadow: 0 10px 30px rgba(188,19,254,0.3); }
        .btn-reset { background: #00ff41; color: #000; display: none; margin-top: 10px; } /* Botão de Reset Escondido */
        .status-msg { margin-top: 15px; font-size: 0.8em; color: #555; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="info-panel">
        <h1 style="margin:0; font-size:1.8em; text-shadow: 0 0 10px #bc13fe;">🔱 SONIC CARDS SA</h1>
        <p class="status-msg" id="status-txt">SISTEMA AGUARDANDO SINCRONIA</p>
        <button id="start-btn" class="btn-main" onclick="initSonicSystem()">INICIAR TREINAMENTO</button>
        <button id="reset-btn" class="btn-main btn-reset" onclick="initSonicSystem()">JOGAR NOVAMENTE</button>
    </div>

    <div id="board"></div>

    <script>
        const cardPairs = [
            {s:'🔱',v:'Soberania'}, {s:'🔱',v:'Soberania'},
            {s:'🌹',v:'Raridade'}, {s:'🌹',v:'Raridade'},
            {s:'⚡',v:'Impulso'}, {s:'⚡',v:'Impulso'},
            {s:'💀',v:'Risco'}, {s:'💀',v:'Risco'},
            {s:'💎',v:'Blindagem'}, {s:'💎',v:'Blindagem'},
            {s:'🌀',v:'Vortex'}, {s:'🌀',v:'Vortex'},
            {s:'⚛️',v:'Atomo'}, {s:'⚛️',v:'Atomo'},
            {s:'👁️',v:'Vigilancia'}, {s:'👁️',v:'Vigilancia'}
        ];
        
        let flippedCards = [];
        let matchedCount = 0;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.pitch = 0.75;
            window.speechSynthesis.speak(utterance);
        }

        function initSonicSystem() {
            // Reset de interface e lógica [cite: 2026-01-28]
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('status-txt').innerText = "OUÇA E PAREIE OS PADRÕES";
            document.getElementById('status-txt').style.color = "#555";
            
            const board = document.getElementById('board');
            board.innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            
            // Embaralhamento S.A.
            cardPairs.sort(() => Math.random() - 0.5);

            cardPairs.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.symbol = data.s;
                card.dataset.voice = data.v;
                
                card.onclick = () => {
                    if (flippedCards.length < 2 && !card.classList.contains('active') && !card.classList.contains('match')) {
                        card.classList.add('active');
                        card.innerText = card.dataset.symbol;
                        speak(card.dataset.voice);
                        flippedCards.push(card);
                        if (flippedCards.length === 2) checkMatch();
                    }
                };
                board.appendChild(card);
            });
            speak("Sistema Reiniciado. Boa sorte S.A.");
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.voice === c2.dataset.voice) {
                setTimeout(() => {
                    c1.classList.add('match');
                    c2.classList.add('match');
                    speak("Confirmado.");
                    matchedCount++;
                    flippedCards = [];
                    if (matchedCount === cardPairs.length / 2) {
                        document.getElementById('status-txt').innerText = "TREINAMENTO COMPLETO";
                        document.getElementById('status-txt').style.color = "#00ff41";
                        document.getElementById('reset-btn').style.display = 'inline-block'; // APARECE O BOTÃO
                        speak("Excelente, S.A. Deseja jogar novamente?");
                    }
                }, 400);
            } else {
                setTimeout(() => {
                    c1.classList.remove('active');
                    c2.classList.remove('active');
                    c1.innerText = '';
                    c2.innerText = '';
                    flippedCards = [];
                }, 1000);
            }
        }
    </script>
</body>
</html>
