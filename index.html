<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC CARDS - S.A. PRECISION</title>
    <style>
        body { background: #000; color: #bc13fe; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; padding: 10px; }
        #info-panel { text-align: center; width: 100%; margin-bottom: 15px; }
        
        /* Barra de Tempo S.A. [cite: 2026-02-28] */
        #timer-container { width: 90vw; max-width: 400px; height: 6px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: #00ff41; box-shadow: 0 0 15px #00ff41; transition: width 0.1s linear; }

        #board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 95vw; max-width: 420px; }
        .card { height: 80px; background: #0a0a0a; border: 2px solid #222; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; color: transparent; transition: 0.3s; position: relative; }
        
        .card.active, .card.preview { border-color: #bc13fe; box-shadow: 0 0 15px #bc13fe; color: #fff; transform: rotateY(180deg); }
        .card.match { background: #00ff41; border-color: #00ff41; color: #000 !important; cursor: default; animation: explode 0.4s ease-out forwards; }
        
        /* Combo Flash [cite: 2026-01-28] */
        .combo-active { border-color: #fff !important; box-shadow: 0 0 30px #fff !important; }

        @keyframes explode { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(0.95); } }

        .btn-main { background: #bc13fe; color: #fff; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1em; text-transform: uppercase; box-shadow: 0 5px 20px rgba(188,19,254,0.4); }
        .btn-reset { background: #ff0033; color: #fff; display: none; margin-top: 10px; }
        .status-msg { margin-top: 10px; font-size: 0.7em; color: #555; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="info-panel">
        <h1 style="margin:0; font-size:1.4em; text-shadow: 0 0 10px #bc13fe;">🔱 SONIC CARDS PRECISION</h1>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <p class="status-msg" id="status-txt">SISTEMA EM ESPERA</p>
        <button id="start-btn" class="btn-main" onclick="initSonicSystem()">INICIAR PROTOCOLO</button>
        <button id="reset-btn" class="btn-main btn-reset" onclick="location.reload()">REINICIAR SISTEMA</button>
    </div>

    <div id="board"></div>

    <script>
        const cardPairs = [
            {s:'🔱',v:'Soberania'}, {s:'🔱',v:'Soberania'}, {s:'🌹',v:'Raridade'}, {s:'🌹',v:'Raridade'},
            {s:'⚡',v:'Impulso'}, {s:'⚡',v:'Impulso'}, {s:'💀',v:'Risco'}, {s:'💀',v:'Risco'},
            {s:'💎',v:'Blindagem'}, {s:'💎',v:'Blindagem'}, {s:'🌀',v:'Vortex'}, {s:'🌀',v:'Vortex'},
            {s:'⚛️',v:'Atomo'}, {s:'⚛️',v:'Atomo'}, {s:'👁️',v:'Visão'}, {s:'👁️',v:'Visão'},
            {s:'🛡️',v:'Defesa'}, {s:'🛡️',v:'Defesa'}, {s:'🔊',v:'Som'}, {s:'🔊',v:'Som'},
            {s:'🧠',v:'Mente'}, {s:'🧠',v:'Mente'}, {s:'🔥',v:'Ação'}, {s:'🔥',v:'Ação'}
        ];
        
        let flippedCards = [], matchedCount = 0, isProcessing = true, combo = 0;
        let timeLeft = 60, timerInterval;
        const synth = window.speechSynthesis;

        function speak(text, fast = false) {
            synth.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.pitch = fast ? 1.2 : 0.8;
            utterance.rate = fast ? 1.4 : 1.1;
            synth.speak(utterance);
        }

        function startTimer() {
            document.getElementById('timer-container').style.display = 'block';
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                let percentage = (timeLeft / 60) * 100;
                document.getElementById('timer-bar').style.width = percentage + "%";
                if (timeLeft <= 15) document.getElementById('timer-bar').style.background = "#ff0033";
                if (timeLeft <= 0) gameOver();
            }, 100);
        }

        function gameOver() {
            clearInterval(timerInterval);
            isProcessing = true;
            speak("Tempo esgotado. Falha na blindagem.");
            document.getElementById('status-txt').innerText = "SISTEMA COMPROMETIDO";
            document.getElementById('reset-btn').style.display = 'inline-block';
        }

        function initSonicSystem() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status-txt').innerText = "MEMORIZE OS PADRÕES...";
            const board = document.getElementById('board');
            board.innerHTML = '';
            cardPairs.sort(() => Math.random() - 0.5);

            cardPairs.forEach((data) => {
                const card = document.createElement('div');
                card.className = 'card preview';
                card.dataset.symbol = data.s;
                card.dataset.voice = data.v;
                card.innerText = data.s;
                card.onclick = () => {
                    if (isProcessing) return;
                    if (flippedCards.length < 2 && !card.classList.contains('active') && !card.classList.contains('match')) {
                        card.classList.add('active');
                        card.innerText = card.dataset.symbol;
                        speak(card.dataset.voice, combo > 1);
                        flippedCards.push(card);
                        if (flippedCards.length === 2) checkMatch();
                    }
                };
                board.appendChild(card);
            });

            speak("Memorize em três segundos.");
            setTimeout(() => {
                document.querySelectorAll('.card').forEach(c => { c.classList.remove('preview'); c.innerText = ''; });
                isProcessing = false;
                document.getElementById('status-txt').innerText = "EXECUTAR!";
                speak("Protocolo iniciado. Rápido.");
                startTimer();
            }, 3000);
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.voice === c2.dataset.voice) {
                combo++;
                setTimeout(() => {
                    c1.classList.add('match'); c2.classList.add('match');
                    if (combo > 1) { speak("Combo " + combo, true); } else { speak("Ok."); }
                    matchedCount++;
                    if (matchedCount === cardPairs.length / 2) win();
                    flippedCards = [];
                }, 300);
            } else {
                combo = 0;
                setTimeout(() => {
                    c1.classList.remove('active'); c2.classList.remove('active');
                    c1.innerText = ''; c2.innerText = '';
                    flippedCards = [];
                }, 800);
            }
        }

        function win() {
            clearInterval(timerInterval);
            speak("Soberania atingida em " + (60 - timeLeft).toFixed(1) + " segundos. Excelente.");
            document.getElementById('status-txt').innerText = "PRECISÃO ABSOLUTA";
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('reset-btn').style.background = "#00ff41";
            document.getElementById('reset-btn').innerText = "NOVO PROTOCOLO";
        }
    </script>
</body>
</html>
