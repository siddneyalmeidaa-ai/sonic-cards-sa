<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.A. ULTIMATE - BLINDAGEM TOTAL</title>
    <style>
        body { background: #000; color: #bc13fe; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; padding: 10px; }
        #board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 95vw; max-width: 400px; }
        .card { height: 75px; background: #0a0a0a; border: 2px solid #222; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        /* Ícones em SVG Puro para nunca falhar [cite: 2026-02-13] */
        .icon { width: 40px; height: 40px; fill: #bc13fe; display: none; }
        .card.active .icon, .card.preview .icon { display: block; }
        .card.active { border-color: #bc13fe; box-shadow: 0 0 15px #bc13fe; }
        .card.match { background: #00ff41; border-color: #00ff41; }
        .card.match .icon { fill: #000; }
        
        #result-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .metric-box { border: 2px solid #00ff41; padding: 20px; border-radius: 15px; background: #050505; color: #00ff41; width: 80%; }
        .btn-main { background: #bc13fe; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 900; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="info-panel" style="text-align:center;">
        <h2 style="font-size:1em; margin:5px;">🔱 S.A. ENGINE V17</h2>
        <div id="clock" style="font-size:2em; color:#00ff41; font-weight:900;">60.0</div>
        <button id="start-btn" class="btn-main" onclick="init()">INICIAR PROTOCOLO</button>
    </div>

    <div id="board"></div>

    <div id="result-screen">
        <div class="metric-box">
            <h2 id="res-status" style="font-size: 1.5em; margin: 10px 0;">0% PENDENTE</h2>
            <p id="res-detail" style="font-size: 0.8em;">ANALISANDO PROJEÇÃO...</p>
            <button class="btn-main" onclick="location.reload()" style="background:#00ff41; color:#000;">REPETIR CICLO</button>
        </div>
    </div>

    <script>
        // Ícones em código SVG (Indestrutíveis) [cite: 2026-02-13]
        const svgs = {
            soberania: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>',
            blindagem: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>',
            impulso: '<svg class="icon" viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>',
            visao: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'
        };

        const cardsData = [
            {id:'s', h:svgs.soberania, v:'Soberania'}, {id:'s', h:svgs.soberania, v:'Soberania'},
            {id:'b', h:svgs.blindagem, v:'Blindagem'}, {id:'b', h:svgs.blindagem, v:'Blindagem'},
            {id:'i', h:svgs.impulso, v:'Impulso'}, {id:'i', h:svgs.impulso, v:'Impulso'},
            {id:'v', h:svgs.visao, v:'Visão'}, {id:'v', h:svgs.visao, v:'Visão'}
        ];

        let flipped = [], matches = 0, clicks = 0, time = 60.0, timer;

        function init() {
            document.getElementById('start-btn').style.display = 'none';
            const b = document.getElementById('board');
            cardsData.sort(() => Math.random() - 0.5);
            cardsData.forEach(d => {
                const c = document.createElement('div');
                c.className = 'card preview';
                c.innerHTML = d.h;
                c.dataset.v = d.v;
                c.onclick = () => flip(c);
                b.appendChild(c);
            });

            setTimeout(() => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('preview'));
                timer = setInterval(() => {
                    time -= 0.1;
                    document.getElementById('clock').innerText = time.toFixed(1);
                    if(time <= 0) end(false);
                }, 100);
            }, 2000);
        }

        function flip(c) {
            if(flipped.length < 2 && !c.classList.contains('active') && !c.classList.contains('match')) {
                c.classList.add('active');
                flipped.push(c);
                clicks++;
                if(flipped.length === 2) {
                    if(flipped[0].dataset.v === flipped[1].dataset.v) {
                        flipped.forEach(x => x.classList.add('match'));
                        matches++;
                        flipped = [];
                        if(matches === cardsData.length/2) end(true);
                    } else {
                        setTimeout(() => {
                            flipped.forEach(x => x.classList.remove('active'));
                            flipped = [];
                        }, 500);
                    }
                }
            }
        }

        function end(win) {
            clearInterval(timer);
            const precision = Math.round(((matches * 2) / (clicks || 1)) * 100);
            const status = document.getElementById('res-status');
            
            // Sincronização de Status [cite: 2026-01-12]
            status.innerText = win ? `${precision}% LIBERADO` : `${precision}% PENDENTE`;
            status.style.color = win ? "#00ff41" : "#ff0033";
            
            // Aplica -50% da projeção para segurança [cite: 2026-01-16]
            document.getElementById('res-detail').innerText = `PROJEÇÃO REAL: ${Math.round(precision * 0.5)}%`;
            document.getElementById('result-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
